    <p>
        時間割の列を選択すると、行事及びメモが出現します。行事は学校から配布される行事予定表に基づいており、メモは自由に入力することができます。一度タブを閉じた後も残り続けるので、提出物などを書き込んでおきましょう。<br><br>
        過去の時間割や先の時間割を見たいときは、「前へ」「次へ」を選択するか、日付を指定することもできます。前期の分は入力しています。<br><br>
        不具合や改善点を見つけたら、「不具合の報告」から報告してください。Google formが開きます。<br><br>
        時間割の修正があった際には、「更新履歴」に追加します。スマホでの利用を想定しています。また、Chromebookではブロックされます。
    </p>
